<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="keystyle.css">
    <script src="https://kit.fontawesome.com/c4a1354679.js" crossorigin="anonymous"></script>
    <title>KEYBOARD</title>
</head>
<body>
    <div class="keyboard">
    <div class="typed-display">
        <textarea id="typedOutput" rows="2" placeholder="Click keyboard keys to type..." readonly></textarea>
    </div>
    <div class="first">
        <button id="fun">ESC</button>
        <button id="fun">f1 <sub><i class="fa-regular fa-face-grin-wide"></i></sub></button>
        <button id="fun">f2 <sub><i class="fa-regular fa-sun"></i></sub></button>
        <button id="fun">f3 <sub><i class="fa-solid fa-sun"></i></sub></button>
        <button id="fun">f4 <sub><i class="fa-regular fa-keyboard"></i></sub></button>
        <button id="fun">f5 <sub><i class="fa-solid fa-volume-xmark"></i></sub></button>
        <button id="fun">f6 <sub><i class="fa-solid fa-volume-low"></i></sub></button>
        <button id="fun">f7 <sub><i class="fa-solid fa-volume-high"></i></sub></button>
        <button id="fun">f8 <sub><i class="fa-solid fa-microphone-slash"></i></sub></button>
        <button id="fun">f9 <sub><i class="fa-solid fa-backward-fast"></i></sub></button>
        <button id="fun">f10 <sub><i class="fa-solid fa-circle-pause"></i></sub></button>
        <button id="fun">f11 <sub><i class="fa-solid fa-forward-fast"></i></sub></button>
        <button id="fun">f12 <sub><i class="fa-regular fa-copy"></i></sub></button>
        <button id="fun" style="font-size: 15px;">PRT SC</button>
        <button id="fun"><i class="fa-solid fa-power-off"></i></button>
        <button id="fun">DELETE</button>
        <button id="fun">HOME</button>
        <button id="fun">END</button>
        <button id="fun">PG UP</button>
        <button id="fun">PG DN</button>
    </div>
    <div class="second">
    <button id="num" >~<sub style="padding: 20px;">`</sub></button>
    <button id="num" >!<sub style="padding: 15px;">1</sub></button>
    <button id="num">@<sub style="padding: 15px;">2</sub></button>
    <button id="num"># <sub style="padding: 15px;">3</sub></button>
    <button id="num">$ <sub style="padding: 15px;">4</sub></button>
    <button id="num">% <sub style="padding: 15px;">5</sub></button>
    <button id="num">^ <sub style="padding: 15px;">6</sub></button>
    <button id="num">& <sub style="padding: 15px;">7</sub></button>
    <button id="num">* <sub style="padding: 15px;">8</sub></button>
    <button id="num">( <sub style="padding: 15px;">9</sub></button>
    <button id="num">) <sub style="padding: 15px;">0</sub></button>
    <button id="num">_ <sub style="padding: 15px;">-</sub></button>
    <button id="num">+ <sub style="padding: 15px;">=</sub></button>
    <button id="num" style="width: 160px; ;">BKSP</button>
    <button id="num">NUM <br>LOCK</button>
    <button id="num">/</button>
    <button id="num">*</button>
    <button id="num">-</button>
    
</div>
    <div class="third">
        <button id="alpha1" style="width: 140px; background-color: maroon;;">TAB</button>
        <button id="alpha1">Q</button>
        <button id="alpha1">W</button>
        <button id="alpha1">E</button>
        <button id="alpha1">R</button>
        <button id="alpha1">T</button>
        <button id="alpha1">Y</button>
        <button id="alpha1">U</button>
        <button id="alpha1">I</button>
        <button id="alpha1">O</button>
        <button id="alpha1">P</button>
        <button id="alpha1">{ <SUB style="padding: 15px;">[</SUB></button>
        <button id="alpha1">} <SUB style="padding: 15px;">]</SUB></button>
        <button id="alpha1" style="width: 110px;">| <SUB style="padding: 15px;">\</SUB></button>
        <button id="alpha1">7 <BR>HOME</BR></button>
        <button id="alpha1">8 <br><i class="fa-solid fa-arrow-up"></i></button>
        <button id="alpha1">9 <BR>PG UP</BR></button>
        <button id="alphaplus">+</button>
    </div>
    <div class="fourth">
        <button id="alpha2" style="width: 180px; background-color: maroon;">CAPS</button>
        <button id="alpha2">A</button>
        <button id="alpha2">S</button>
        <button id="alpha2">D</button>
        <button id="alpha2">F</button>
        <button id="alpha2">G</button>
        <button id="alpha2">H</button>
        <button id="alpha2">J</button>
        <button id="alpha2">K</button>
        <button id="alpha2">L</button>
        <button id="alpha2">: <sub style="padding: 15px;">;</sub></button>
        <button id="alpha2">"<sub style="padding: 15px;">'</sub></button>
        <button id="alpha2" style="width: 150px; background-color: maroon;">ENTER</button>
        <button id="alpha2">4 <br><i class="fa-solid fa-arrow-left-long"></i></button>
        <button id="alpha2">5</button>
        <button id="alpha2">6 <br><i class="fa-solid fa-arrow-right"></i></button>
    </div>
    <div class="fifth">
        <button id="alpha3" style="width: 240px; background-color: maroon;">SHIFT</button>
        <button id="alpha3">Z</button>
        <button id="alpha3">X</button>
        <button id="alpha3">C</button>
        <button id="alpha3">V</button>
        <button id="alpha3">B</button>
        <button id="alpha3">N</button>
        <button id="alpha3">M</button>
        <button id="alpha3" style="padding-bottom: 18px;"><<sub style="padding: 15px;">,</sub></button>
        <button id="alpha3" style="padding-bottom: 18px;">> <sub style="padding: 15px;">.</sub></button>
        <button id="alpha3" style="padding-bottom: 18px;">? <sub style="padding: 15px; padding-top: 40px;">/</sub></button>
        <button id="alpha3" style="width: 200px; background-color: maroon;">SHIFT</button>
        <button id="alpha3">1<br>END</button>
        <button id="alpha3">2 <br><i class="fa-solid fa-arrow-down"></i></button>
        <button id="alpha3">3 <br>PGDN</br></button>
        <button id="alpha3" style="padding-bottom: 62px; text-align: center; padding-top: 55px; background-color: maroon;">ENTER</button>
    </div>
    <div class="ctrl">
        <button id="last">CTRL</button>
        <button id="last">FN</button>
        <button id="last"><i class="fa-brands fa-windows"></i></button>
        <button id="last">ALT</button>
        <button id="last" style="width: 540px; background-color: bisque; color: black;">______________________________________</button>
        <button id="last">ALT</button>
        <button id="last">CTRL</button>
        <button id="last"><</button>
        <button id="last"><i class="fa-solid fa-angle-up"></i><br><hr><i class="fa-solid fa-chevron-down"></i></button>
        <button id="last">></button>
        <button id="last" style="width: 188px;">0 <br>INS</br></button>
        <button id="last">. <sub>DEL</br></button>
    </div>
    </div>
    <script src="keyboard.js"></script>
</body>
</html>
